<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Clock face -->
  <circle cx="50" cy="48" r="28" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>
  <!-- Progress arc (16:8 fasting = 2/3 of circle) -->
  <circle cx="50" cy="48" r="28" fill="none" stroke="white" stroke-width="4" stroke-dasharray="117.3 58.6" stroke-linecap="round" transform="rotate(-90 50 48)"/>
  <!-- Clock hands -->
  <line x1="50" y1="48" x2="50" y2="28" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="48" x2="62" y2="48" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="50" cy="48" r="3" fill="white"/>
  <!-- Fork/spoon icon at bottom -->
  <line x1="40" y1="78" x2="40" y2="68" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="78" x2="44" y2="68" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M38 68 Q38 64 40 63 Q42 64 42 68" fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M42 68 Q42 64 44 63 Q46 64 46 68" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Knife -->
  <line x1="56" y1="78" x2="56" y2="66" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M56 66 Q56 62 60 63 Q58 65 56 66" fill="white" opacity="0.9"/>
</svg>
